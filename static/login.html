<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUTTAŞ İK — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dark: #1e2a4a;
  --dark-2: #263357;
  --dark-3: #2d3d66;
  --white: #ffffff;
  --text-light: rgba(255,255,255,.75);
  --text-lighter: rgba(255,255,255,.45);
  --accent: #4361ee;
  --accent-hover: #3651d4;
  --border-light: rgba(255,255,255,.12);
  --border-light-2: rgba(255,255,255,.08);
  --radius: 10px;
}

html, body { height: 100%; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: flex;
  background: var(--dark);
}

.split-left {
  width: 460px;
  min-height: 100vh;
  background: var(--dark);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 52px;
  position: relative;
  flex-shrink: 0;
}

.split-right {
  flex: 1;
  background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.split-right::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(67,97,238,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(67,97,238,.06) 0%, transparent 50%);
}

.right-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 48px;
  max-width: 560px;
}

.right-mockup {
  width: 100%;
  max-width: 480px;
  border-radius: 16px;
  box-shadow: 0 25px 60px rgba(30,42,74,.18), 0 8px 24px rgba(30,42,74,.1);
  margin-bottom: 32px;
}

.right-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 10px;
  line-height: 1.3;
}

.right-desc {
  font-size: 14px;
  color: #5a6480;
  line-height: 1.6;
  max-width: 400px;
  margin: 0 auto;
}

.logo-area {
  margin-bottom: 44px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}

.logo-img {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  object-fit: cover;
}

.logo-text h1 {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: .01em;
}

.logo-text p {
  font-size: 12px;
  color: var(--text-lighter);
  margin-top: 1px;
  letter-spacing: .02em;
}

.form-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 28px;
}

.form-group { margin-bottom: 18px; }

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 7px;
  letter-spacing: .03em;
}

.input-wrap { position: relative; }

.input-wrap input {
  width: 100%;
  padding: 12px 14px;
  background: var(--dark-2);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  color: var(--white);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}

.input-wrap input::placeholder { color: var(--text-lighter); }

.input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(67,97,238,.2);
}

.toggle-pass {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-lighter);
  background: none;
  border: none;
  padding: 2px;
  display: flex;
  align-items: center;
  transition: color .15s;
}
.toggle-pass:hover { color: var(--text-light); }
.toggle-pass svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.alert {
  display: none;
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 18px;
  align-items: center;
  gap: 8px;
  background: rgba(220,38,38,.15);
  border: 1px solid rgba(220,38,38,.25);
  color: #fca5a5;
}
.alert.error { display: flex; }
.alert svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; stroke-linecap: round; stroke-linejoin: round; }

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: .01em;
  margin-top: 6px;
}
.btn-login:hover { background: var(--accent-hover); }
.btn-login:active { transform: scale(0.99); }
.btn-login.loading { background: #5a74c7; pointer-events: none; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.form-links {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
}

.form-links a {
  font-size: 13px;
  color: var(--text-lighter);
  text-decoration: none;
  font-weight: 500;
  transition: color .15s;
}
.form-links a:hover { color: var(--white); }

.login-footer {
  position: absolute;
  bottom: 28px;
  left: 52px;
  right: 52px;
  font-size: 11px;
  color: var(--text-lighter);
}

.dots-pattern {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 16px 16px;
  pointer-events: none;
}

@media (max-width: 900px) {
  body { flex-direction: column; }
  .split-left { width: 100%; min-height: auto; padding: 36px 28px; }
  .split-right { display: none; }
  .login-footer { position: static; margin-top: 32px; }
}
</style>
</head>
<body>

<div class="split-left">
  <div class="dots-pattern"></div>

  <div class="logo-area">
    <div class="logo-row">
      <img src="/static/logo.png" alt="MUTTAŞ" class="logo-img">
      <div class="logo-text">
        <h1>MUTTAŞ İK</h1>
        <p>İnsan Kaynakları Yönetim Sistemi</p>
      </div>
    </div>
  </div>

  <div class="form-title">Hesabınıza giriş yapın</div>

  <div class="alert" id="alert-box" style="display:none">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="alert-msg"></span>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)" novalidate>

    <div class="form-group">
      <label for="email">TC Kimlik No</label>
      <div class="input-wrap">
        <input type="text" id="email" placeholder="TC Kimlik numaranızı girin" autocomplete="username" required maxlength="11" inputmode="numeric">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Parola</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Parolanızı girin" autocomplete="current-password" required>
        <button type="button" class="toggle-pass" onclick="togglePass()" title="Şifreyi göster">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="login-btn">
      <div class="spinner"></div>
      <span class="btn-text">Giriş Yap</span>
    </button>

  </form>

  <div class="form-links">
    <a href="#">Parolamı Unuttum</a>
  </div>

  <a href="/izin-basvuru" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;margin-top:12px;background:transparent;border:1.5px solid var(--accent);border-radius:var(--radius);color:var(--accent);font-family:inherit;font-size:14px;font-weight:700;text-decoration:none;letter-spacing:.01em;transition:background .15s,color .15s;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    İzin Başvurusu
  </a>

  <div class="login-footer">
    &copy; 2026 Muğla Büyükşehir Belediyesi — MUTTAŞ A.Ş.
  </div>
</div>

<div class="split-right">
  <div class="right-content">
    <img src="/static/logo.png" alt="MUTTAŞ" class="right-mockup" style="max-width:180px;border-radius:50%;box-shadow:0 20px 50px rgba(30,42,74,.12)">
    <div class="right-desc">MUTTAŞ İK ile personel bilgilerini yönetin, izin taleplerini takip edin ve tüm İK süreçlerinizi tek bir platformdan kontrol edin.</div>
  </div>
</div>

<script>
function togglePass() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showError(msg) {
  const box = document.getElementById('alert-box');
  document.getElementById('alert-msg').textContent = msg;
  box.classList.add('error');
  box.style.display = 'flex';
}

function hideError() {
  document.getElementById('alert-box').style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('login-btn');
  if (on) btn.classList.add('loading');
  else btn.classList.remove('loading');
}

async function handleLogin(e) {
  if (e && e.preventDefault) e.preventDefault();
  hideError();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email) { showError('TC Kimlik numarası gerekli.'); return; }
  if (!password) { showError('Parola gerekli.'); return; }

  setLoading(true);

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.detail || 'TC Kimlik veya parola hatalı.');
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('kullanici', JSON.stringify(data.kullanici));

    window.location.href = 'dashboard.html';

  } catch (err) {
    showError('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.');
  } finally {
    setLoading(false);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    handleLogin(e);
  }
});
</script>
</body>
</html>
